<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>UNZA STUDENT RESULTS HUB</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body class="fade-scale-up">

<nav class="navbar">
    <div class="nav-left">
        <span class="nav-title">UNZA STUDENT RESULTS HUB</span>
    </div>
    <div class="nav-right">
        <a href="/home">Home</a>
        <a href="/about">About</a>
        <a href="/help">Help</a>
        <a href="/loginPage" onclick="logout()">Log out</a>
    </div>
</nav>

<div class="container">
    <div class="image-section"></div>

    <div class="results-section">
    <div class="results-form">
        <img  src="/images.png" alt="UNZA Logo" class="logo">
        
        <h1>THE UNIVERSITY OF ZAMBIA<br>STUDENT RESULTS HUB</h1>
        
        <p>Click the button below to download your exam results:</p>

        <button class="results-form button" onclick="printResults()">Print Results</button>
        
        <hr>
        
        <p>Click the button below to have your results emailed to you</p>
        
        <button class="results-form button" onclick="emailResults()">Email Results</button>
    
    </div>
</div>

            
    </div>
</div>

<footer class="footer">
    <p>&copy; Developed By : Phillip Phiri | 2025</p>
</footer>

<script>
    // ✅ Get JWT from localStorage
    function getToken() {
        const token = localStorage.getItem("jwtToken");
        if (!token) {
            alert("❌ You must login first.");
            window.location.href = "/loginPage";
        }
        return token;
    }

    // 1️⃣ Print PDF in new tab
    // 1️⃣ Print / Download PDF without opening a new tab
function printResults() {
    const token = getToken();
    fetch("/pdf/check", {
        headers: { "Authorization": "Bearer " + token }
    })
    .then(res => res.text())
    .then(result => {
        if (result === "Valid") {
            // Fetch the PDF bytes
            fetch("/pdf/generate", {
                method: "GET",
                headers: { "Authorization": "Bearer " + token }
            })
            .then(res => {
                if (!res.ok) throw new Error("Failed to fetch PDF");
                return res.blob();
            })
            .then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "exam_results.pdf"; // File name
                a.click();
                window.URL.revokeObjectURL(url); // Clean up
            })
            .catch(err => alert("❌ Error downloading PDF: " + err));
        } else {
            alert("❌ No results found for your account.");
        }
    })
    .catch(err => {
        console.error(err);
        alert("❌ Error checking results.");
    });
}


    // 2️⃣ Email results
    function emailResults() {
        const token = getToken();
        fetch("/pdf/email", {
            method: "POST",
            headers: { "Authorization": "Bearer " + token }
        })
        .then(res => res.text())
        .then(msg => alert(msg))
        .catch(err => {
            console.error(err);
            alert("❌ Failed to send results email.");
        });
    }

    // 3️⃣ Logout
    function logout() {
        localStorage.removeItem("jwtToken");
    }
</script>

</body>
</html>
